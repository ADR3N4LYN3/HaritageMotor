# Heritage Motor — golangci-lint v2 configuration
# https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 5m
  go: "1.25"
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  enable:
    # Security
    - gosec
    # Static analysis
    - staticcheck
    - govet
    # Style & correctness
    - revive
    - errcheck
    - ineffassign
    - unused
    - misspell
    # HTTP body leaks
    - bodyclose
  settings:
    gosec:
      excludes:
        - G104
      config:
        global:
          audit: false
    revive:
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          disabled: true
        - name: increment-decrement
        - name: var-naming
        - name: package-comments
          disabled: true
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
    staticcheck:
      checks:
        - all
        - -ST1000  # package comments — too verbose
    govet:
      enable-all: true
      disable:
        - fieldalignment
    misspell:
      locale: US
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
      - path: testutil/
        linters:
          - gosec
          - errcheck
      - linters:
          - gosec
        text: "G114"
      - linters:
          - gosec
        text: "G404"
    paths:
      - vendor
      - node_modules
      - video
      - pwa
      - web
      - docs
      - plausible

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/chriis/heritage-motor
