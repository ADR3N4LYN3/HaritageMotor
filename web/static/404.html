<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/favicon.png">
<title>404 — Heritage Motor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap"></noscript>
<script defer data-domain="heritagemotor.app" src="https://stats.heritagemotor.app/js/script.outbound-links.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black: #0e0d0b;
  --gold: #b8955a;
  --gold-dk: #96783f;
  --gold-lt: #dcc28a;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
}
body {
  font-family: var(--sans);
  background: var(--black);
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
  overflow: hidden;
  position: relative;
}

/* Background photo */
.bg-photo {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: center;
  transform: scale(1.05);
  pointer-events: none;
}
/* Dark overlay */
.bg-overlay {
  position: fixed; inset: 0;
  background: linear-gradient(180deg, rgba(14,13,11,0.94) 0%, rgba(14,13,11,0.85) 40%, rgba(14,13,11,0.85) 60%, rgba(14,13,11,0.95) 100%);
  pointer-events: none;
}
/* Noise texture */
.bg-noise {
  position: fixed; inset: 0;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
}

/* Content */
.content { position: relative; z-index: 10; max-width: 32rem; }

.crest { width: 54px; height: auto; margin-bottom: 2.5rem; }

.code {
  font-family: var(--sans);
  font-size: clamp(6rem, 18vw, 12rem);
  font-weight: 700;
  background: linear-gradient(180deg, var(--gold-lt) 0%, var(--gold) 45%, var(--gold-dk) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  opacity: 0.3;
  line-height: 1;
  letter-spacing: 0.05em;
}
h1 {
  font-family: var(--serif);
  font-size: 1.5rem;
  font-weight: 300;
  color: #fff;
  margin-top: 0.75rem;
  letter-spacing: 0.08em;
}
.desc {
  color: rgba(255,255,255,0.4);
  font-size: 0.88rem;
  line-height: 1.7;
  margin-top: 0.75rem;
}
.sep {
  width: 4rem; height: 1px;
  margin: 2rem auto;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

/* CTA — same as landing .nav-cta */
.cta {
  display: inline-block;
  position: relative;
  padding: 0.85rem 2.5rem;
  font-family: var(--sans);
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  text-decoration: none;
  color: var(--gold);
  border: 1px solid rgba(184,149,90,0.4);
  border-radius: 4px;
  overflow: hidden;
  transition: color 0.5s, border-color 0.5s;
}
.cta::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--gold);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.5s cubic-bezier(0.22,1,0.36,1);
}
.cta:hover { color: var(--black); border-color: var(--gold); }
.cta:hover::before { transform: scaleX(1); }
.cta span { position: relative; z-index: 1; }

/* Language switcher */
.lang-sw {
  display: flex; gap: 1.2rem;
  margin-top: 2.5rem;
  justify-content: center;
}
.lang-sw button {
  background: none; border: none; cursor: pointer;
  font-family: var(--sans);
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  transition: color 0.3s;
}
.lang-sw button:hover { color: rgba(255,255,255,0.5); }
.lang-sw button.active { color: var(--gold); }

/* COOKIE BANNER */
.cookie-banner {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 9999;
  padding: 0 1.5rem 1.5rem;
  pointer-events: none;
}
.cookie-banner[hidden] { display: none; }
.cookie-inner {
  max-width: 600px;
  margin: 0 auto;
  background: rgba(26, 25, 22, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(184, 149, 90, 0.15);
  border-radius: 16px;
  padding: 1.25rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1.25rem;
  pointer-events: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.cookie-text {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 300;
  color: rgba(250, 249, 247, 0.75);
  line-height: 1.6;
  margin: 0;
}
.cookie-link {
  color: #b8955a;
  text-decoration: underline;
  text-underline-offset: 2px;
}
.cookie-link:hover { color: #d4b07a; }
.cookie-btn {
  white-space: nowrap;
  padding: 0.55rem 1.5rem;
  border-radius: 8px;
  border: 1px solid rgba(184, 149, 90, 0.35);
  background: transparent;
  color: #b8955a;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.cookie-btn:hover {
  background: #b8955a;
  color: #0e0d0b;
  border-color: #b8955a;
}
@media (max-width: 600px) {
  .cookie-inner { flex-direction: column; align-items: stretch; text-align: center; }
  .cookie-btn { width: 100%; }
}
</style>
</head>
<body>

<img class="bg-photo" src="https://images.unsplash.com/photo-1647968813399-d442099cf04b?w=1920&q=60&auto=format&fit=crop" alt="">
<div class="bg-overlay"></div>
<div class="bg-noise"></div>

<div class="content">
  <!-- Shield crest -->
  <svg class="crest" viewBox="0 0 280 336" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="nGH" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#96783f"/><stop offset="50%" stop-color="#dcc28a"/><stop offset="100%" stop-color="#96783f"/>
      </linearGradient>
      <linearGradient id="nDk" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#191816"/><stop offset="100%" stop-color="#0e0d0b"/>
      </linearGradient>
      <linearGradient id="nGV" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#dcc28a"/><stop offset="45%" stop-color="#b8955a"/><stop offset="100%" stop-color="#96783f"/>
      </linearGradient>
    </defs>
    <path d="M140,4 L264,4 Q276,4 276,16 L276,186 Q276,230 248,260 Q218,292 140,332 Q62,292 32,260 Q4,230 4,186 L4,16 Q4,4 16,4 Z" fill="url(#nGH)"/>
    <path d="M140,12 L260,12 Q268,12 268,20 L268,184 Q268,226 242,254 Q214,284 140,322 Q66,284 38,254 Q12,226 12,184 L12,20 Q12,12 20,12 Z" fill="url(#nDk)"/>
    <path d="M140,22 L254,22 Q260,22 260,28 L260,180 Q260,220 236,246 Q210,274 140,310 Q70,274 44,246 Q20,220 20,180 L20,28 Q20,22 26,22 Z" fill="none" stroke="#b8955a" stroke-width="1.2"/>
    <text x="140" y="185" text-anchor="middle" font-family="'Cormorant Garamond','Georgia',serif" font-size="118" font-weight="700" letter-spacing="5" fill="url(#nGV)">HM</text>
  </svg>

  <div class="code">404</div>
  <h1 data-i18n="title">Page not found</h1>
  <p class="desc" data-i18n="desc">The page you are looking for does not exist or has been moved.</p>
  <div class="sep"></div>
  <a class="cta" href="/"><span data-i18n="cta">Back to Heritage Motor</span></a>

  <div class="lang-sw">
    <button data-lang="en" class="active">EN</button>
    <button data-lang="fr">FR</button>
    <button data-lang="de">DE</button>
  </div>
</div>

<!-- Cookie Banner -->
<div id="cookie-banner" class="cookie-banner" role="dialog" aria-label="Cookie consent" hidden>
  <div class="cookie-inner">
    <p class="cookie-text" data-i18n-html="cookie_text">This website saves your language preference locally in your browser. No tracking cookies are used. See our <a href="/privacy" class="cookie-link">Privacy Policy</a>.</p>
    <div class="cookie-actions">
      <button id="cookie-accept" class="cookie-btn" data-i18n="cookie_accept">Accept</button>
    </div>
  </div>
</div>

<script>
const i18n = {
  fr: { title: "Page introuvable", desc: "La page que vous cherchez n\u2019existe pas ou a \u00e9t\u00e9 d\u00e9plac\u00e9e.", cta: "Retour \u00e0 Heritage Motor", cookie_text: 'Ce site sauvegarde votre pr\u00e9f\u00e9rence linguistique localement dans votre navigateur. Aucun cookie de suivi n\'est utilis\u00e9. Voir notre <a href="/privacy" class="cookie-link">Politique de confidentialit\u00e9</a>.', cookie_accept: "Accepter" },
  de: { title: "Seite nicht gefunden", desc: "Die gesuchte Seite existiert nicht oder wurde verschoben.", cta: "Zur\u00fcck zu Heritage Motor", cookie_text: 'Diese Website speichert Ihre Spracheinstellung lokal in Ihrem Browser. Es werden keine Tracking-Cookies verwendet. Siehe unsere <a href="/privacy" class="cookie-link">Datenschutzerkl\u00e4rung</a>.', cookie_accept: "Akzeptieren" },
};

/* Store original HTML for data-i18n-html elements */
document.querySelectorAll('[data-i18n-html]').forEach(el => { el._origHTML = el.cloneNode(true); });

function setLang(lang) {
  const dict = i18n[lang] || {};
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    el.textContent = (dict[key]) || el.textContent;
  });
  /* Reset English from defaults if needed */
  if (lang === 'en') {
    document.querySelector('[data-i18n="title"]').textContent = 'Page not found';
    document.querySelector('[data-i18n="desc"]').textContent = 'The page you are looking for does not exist or has been moved.';
    document.querySelector('[data-i18n="cta"]').textContent = 'Back to Heritage Motor';
    const acceptBtn = document.querySelector('[data-i18n="cookie_accept"]');
    if (acceptBtn) acceptBtn.textContent = 'Accept';
  }
  /* Cookie banner i18n — trusted hardcoded dict, not user input */
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const hKey = el.getAttribute('data-i18n-html');
    if (dict[hKey]) {
      const tmpl = document.createElement('template');
      tmpl.innerHTML = dict[hKey]; /* eslint-disable-line -- trusted i18n dict, not user input */
      el.replaceChildren(tmpl.content);
    } else if (el._origHTML) {
      el.replaceChildren(...Array.from(el._origHTML.cloneNode(true).childNodes));
    }
  });
  document.querySelectorAll('.lang-sw button').forEach(b => {
    b.classList.toggle('active', b.getAttribute('data-lang') === lang);
  });
  try { localStorage.setItem('hm-lang', lang); } catch {}
}

// Init from saved lang
try {
  const saved = localStorage.getItem('hm-lang');
  if (saved && i18n[saved]) setLang(saved);
} catch {}

// Bind buttons
document.querySelectorAll('.lang-sw button').forEach(b => {
  b.addEventListener('click', () => setLang(b.getAttribute('data-lang')));
});
</script>
<script>
(function() {
  var banner = document.getElementById('cookie-banner');
  var btn = document.getElementById('cookie-accept');
  if (!banner || !btn) return;
  try { if (localStorage.getItem('hm-cookie-consent')) return; } catch(e) {}
  banner.hidden = false;
  btn.addEventListener('click', function() {
    try { localStorage.setItem('hm-cookie-consent', 'accepted'); } catch(e) {}
    banner.hidden = true;
  });
})();
</script>
</body>
</html>
