<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/favicon.png">
<title>404 — Heritage Motor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap"></noscript>
<script defer data-domain="heritagemotor.app" src="https://stats.heritagemotor.app/js/script.outbound-links.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black: #0e0d0b;
  --gold: #b8955a;
  --gold-dk: #96783f;
  --gold-lt: #dcc28a;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
}
body {
  font-family: var(--sans);
  background: var(--black);
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
  overflow: hidden;
  position: relative;
}

/* Background photo */
.bg-photo {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: center;
  transform: scale(1.05);
  pointer-events: none;
}
/* Dark overlay */
.bg-overlay {
  position: fixed; inset: 0;
  background: linear-gradient(180deg, rgba(14,13,11,0.94) 0%, rgba(14,13,11,0.85) 40%, rgba(14,13,11,0.85) 60%, rgba(14,13,11,0.95) 100%);
  pointer-events: none;
}
/* Noise texture */
.bg-noise {
  position: fixed; inset: 0;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
}

/* Content */
.content { position: relative; z-index: 10; max-width: 32rem; }

.crest { width: 54px; height: auto; margin-bottom: 2.5rem; }

.code {
  font-family: var(--sans);
  font-size: clamp(6rem, 18vw, 12rem);
  font-weight: 700;
  background: linear-gradient(180deg, var(--gold-lt) 0%, var(--gold) 45%, var(--gold-dk) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  opacity: 0.3;
  line-height: 1;
  letter-spacing: 0.05em;
}
h1 {
  font-family: var(--serif);
  font-size: 1.5rem;
  font-weight: 300;
  color: #fff;
  margin-top: 0.75rem;
  letter-spacing: 0.08em;
}
.desc {
  color: rgba(255,255,255,0.4);
  font-size: 0.88rem;
  line-height: 1.7;
  margin-top: 0.75rem;
}
.sep {
  width: 4rem; height: 1px;
  margin: 2rem auto;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

/* CTA — same as landing .nav-cta */
.cta {
  display: inline-block;
  position: relative;
  padding: 0.85rem 2.5rem;
  font-family: var(--sans);
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  text-decoration: none;
  color: var(--gold);
  border: 1px solid rgba(184,149,90,0.4);
  border-radius: 4px;
  overflow: hidden;
  transition: color 0.5s, border-color 0.5s;
}
.cta::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--gold);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.5s cubic-bezier(0.22,1,0.36,1);
}
.cta:hover { color: var(--black); border-color: var(--gold); }
.cta:hover::before { transform: scaleX(1); }
.cta span { position: relative; z-index: 1; }

/* Language switcher */
.lang-sw {
  display: flex; gap: 1.2rem;
  margin-top: 2.5rem;
  justify-content: center;
}
.lang-sw button {
  background: none; border: none; cursor: pointer;
  font-family: var(--sans);
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  transition: color 0.3s;
}
.lang-sw button:hover { color: rgba(255,255,255,0.5); }
.lang-sw button.active { color: var(--gold); }
</style>
</head>
<body>

<img class="bg-photo" src="https://images.unsplash.com/photo-1647968813399-d442099cf04b?w=1920&q=60&auto=format&fit=crop" alt="">
<div class="bg-overlay"></div>
<div class="bg-noise"></div>

<div class="content">
  <!-- Shield crest -->
  <svg class="crest" viewBox="0 0 280 336" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="nGH" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#96783f"/><stop offset="50%" stop-color="#dcc28a"/><stop offset="100%" stop-color="#96783f"/>
      </linearGradient>
      <linearGradient id="nDk" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#191816"/><stop offset="100%" stop-color="#0e0d0b"/>
      </linearGradient>
      <linearGradient id="nGV" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#dcc28a"/><stop offset="45%" stop-color="#b8955a"/><stop offset="100%" stop-color="#96783f"/>
      </linearGradient>
    </defs>
    <path d="M140,4 L264,4 Q276,4 276,16 L276,186 Q276,230 248,260 Q218,292 140,332 Q62,292 32,260 Q4,230 4,186 L4,16 Q4,4 16,4 Z" fill="url(#nGH)"/>
    <path d="M140,12 L260,12 Q268,12 268,20 L268,184 Q268,226 242,254 Q214,284 140,322 Q66,284 38,254 Q12,226 12,184 L12,20 Q12,12 20,12 Z" fill="url(#nDk)"/>
    <path d="M140,22 L254,22 Q260,22 260,28 L260,180 Q260,220 236,246 Q210,274 140,310 Q70,274 44,246 Q20,220 20,180 L20,28 Q20,22 26,22 Z" fill="none" stroke="#b8955a" stroke-width="1.2"/>
    <text x="140" y="185" text-anchor="middle" font-family="'Cormorant Garamond','Georgia',serif" font-size="118" font-weight="700" letter-spacing="5" fill="url(#nGV)">HM</text>
  </svg>

  <div class="code">404</div>
  <h1 data-i18n="title">Page not found</h1>
  <p class="desc" data-i18n="desc">The page you are looking for does not exist or has been moved.</p>
  <div class="sep"></div>
  <a class="cta" href="/"><span data-i18n="cta">Back to Heritage Motor</span></a>

  <div class="lang-sw">
    <button data-lang="en" class="active">EN</button>
    <button data-lang="fr">FR</button>
    <button data-lang="de">DE</button>
  </div>
</div>

<script>
const i18n = {
  fr: { title: "Page introuvable", desc: "La page que vous cherchez n\u2019existe pas ou a \u00e9t\u00e9 d\u00e9plac\u00e9e.", cta: "Retour \u00e0 Heritage Motor" },
  de: { title: "Seite nicht gefunden", desc: "Die gesuchte Seite existiert nicht oder wurde verschoben.", cta: "Zur\u00fcck zu Heritage Motor" },
};

function setLang(lang) {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    el.textContent = (i18n[lang] && i18n[lang][key]) || el.textContent;
  });
  // Reset English from defaults if needed
  if (lang === 'en') {
    document.querySelector('[data-i18n="title"]').textContent = 'Page not found';
    document.querySelector('[data-i18n="desc"]').textContent = 'The page you are looking for does not exist or has been moved.';
    document.querySelector('[data-i18n="cta"]').textContent = 'Back to Heritage Motor';
  }
  document.querySelectorAll('.lang-sw button').forEach(b => {
    b.classList.toggle('active', b.getAttribute('data-lang') === lang);
  });
  try { localStorage.setItem('hm-lang', lang); } catch {}
}

// Init from saved lang
try {
  const saved = localStorage.getItem('hm-lang');
  if (saved && i18n[saved]) setLang(saved);
} catch {}

// Bind buttons
document.querySelectorAll('.lang-sw button').forEach(b => {
  b.addEventListener('click', () => setLang(b.getAttribute('data-lang')));
});
</script>
</body>
</html>
