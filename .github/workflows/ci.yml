name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: heritage_motor_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Create heritage_app role for RLS dual pool
        run: |
          PGPASSWORD=testpassword psql -h localhost -U postgres -d heritage_motor_test -c "
            CREATE ROLE heritage_app WITH LOGIN PASSWORD 'testapppassword';
            GRANT CONNECT ON DATABASE heritage_motor_test TO heritage_app;
            GRANT USAGE ON SCHEMA public TO heritage_app;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO heritage_app;
            GRANT ALL ON ALL TABLES IN SCHEMA public TO heritage_app;
            GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO heritage_app;
          "

      - name: Run tests
        env:
          DATABASE_URL_TEST: postgres://postgres:testpassword@localhost:5432/heritage_motor_test?sslmode=disable
          DATABASE_APP_URL_TEST: postgres://heritage_app:testapppassword@localhost:5432/heritage_motor_test?sslmode=disable
          JWT_SECRET: test-jwt-secret-for-ci-minimum-32-chars-long
          APP_ENV: test
        run: go test -v -race -timeout 120s ./...

  pwa-lint-build:
    name: PWA Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pwa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: npm run build
