  .nav-item.active { color: var(--gold); }
  .nav-item:not(.active) { color: rgba(250,249,247,0.3); }
  .nav-item:not(.active):hover { color: rgba(250,249,247,0.5); }

  /* Desktop side */

  .gold-sep { height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0.25; }
  .section-tag { display: flex; align-items: center; gap: 0.75rem; font-size: 0.72rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); font-weight: 500; }

  .brand { font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); }
  .heading { font-weight: 300; letter-spacing: 0.03em; color: var(--white); line-height: 1.2; }
  .input-field { width: 100%; padding: 12px 16px; border-radius: 12px; background: rgba(250,249,247,0.04); border: 1px solid rgba(250,249,247,0.08); color: var(--white); font-size: 14px; font-weight: 300; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.3s var(--ease-lux); }

  .input-field:focus { border-color: rgba(184,149,90,0.4); box-shadow: 0 0 0 1px rgba(184,149,90,0.2); }
  .input-field option { background: var(--dark); color: var(--white); }
  .btn-gold { padding: 10px 24px; border-radius: 8px; background: var(--gold); border: none; color: #0e0d0b; font-size: 12px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.3s; }

  .btn-outline { padding: 10px 20px; border-radius: 8px; border: 1px solid rgba(184,149,90,0.2); background: transparent; color: rgba(184,149,90,0.7); font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; transition: all 0.3s; }
  .btn-outline:hover { background: var(--gold); color: var(--black); border-color: var(--gold); }
  .label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(184,149,90,0.4); margin-bottom: 6px; font-weight: 500; display: block; }

  .page { animation: fadeIn 0.4s var(--ease-lux); }
  .page:not(.active) { display: none !important; }

function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(function(pair) {
    var k = pair[0], v = pair[1];
    if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k === 'className') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  if (children) (Array.isArray(children) ? children : [children]).forEach(function(c) {
    if (c == null) return;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return e;
}
function svg(paths, w, h, sw, color) {
  w = w || 20; h = h || 20; sw = sw || 2; color = color || 'currentColor';
  var ns = 'http://www.w3.org/2000/svg';
  var s = document.createElementNS(ns, 'svg');
  s.setAttribute('width', w); s.setAttribute('height', h); s.setAttribute('viewBox', '0 0 24 24');
  s.setAttribute('fill', 'none'); s.setAttribute('stroke', color); s.setAttribute('stroke-width', sw);
  var tmp = document.createElement('template');
  tmp.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg">' + paths + '</svg>';
  Array.from(tmp.content.firstChild.childNodes).forEach(function(n) { s.appendChild(n.cloneNode(true)); });
  return s;
}

function makeFlag(lang, size) {

  var h = Math.round(size * 0.75);
  var ns = 'http://www.w3.org/2000/svg';
  var s = document.createElementNS(ns, 'svg');
  s.setAttribute('width', size); s.setAttribute('height', h);
  s.setAttribute('viewBox', '0 0 640 480');
  s.style.borderRadius = '2px'; s.style.flexShrink = '0'; s.style.display = 'block';
  if (lang === 'fr') {
    ['#002395','#fff','#ED2939'].forEach(function(c, i) {
      var r = document.createElementNS(ns, 'rect');
      r.setAttribute('x', String(i * 213)); r.setAttribute('width', '214'); r.setAttribute('height', '480'); r.setAttribute('fill', c);
      s.appendChild(r);
    });
  } else if (lang === 'de') {
    [['#000',0],['#DD0000',160],['#FFCC00',320]].forEach(function(p) {
      var r = document.createElementNS(ns, 'rect');
      r.setAttribute('y', String(p[1])); r.setAttribute('width', '640'); r.setAttribute('height', '160'); r.setAttribute('fill', p[0]);
      s.appendChild(r);
    });
  } else {
    var bg = document.createElementNS(ns, 'rect'); bg.setAttribute('width','640'); bg.setAttribute('height','480'); bg.setAttribute('fill','#012169'); s.appendChild(bg);
    [['M0,0L640,480M640,0L0,480','#fff','80'],['M320,0V480M0,240H640','#fff','100'],['M0,0L640,480','#C8102E','36'],['M640,0L0,480','#C8102E','36'],['M320,0V480M0,240H640','#C8102E','60']].forEach(function(p) {
      var path = document.createElementNS(ns, 'path');
      path.setAttribute('d', p[0]); path.setAttribute('stroke', p[1]); path.setAttribute('stroke-width', p[2]); path.setAttribute('fill', 'none');
      s.appendChild(path);
    });
  }
  return s;
}

var langNames = { en: 'English', fr: 'Fran\u00e7ais', de: 'Deutsch' };

function makeLangSwitch() {
  var wrap = el('div', { className: 'lang-wrap' });

  // Trigger button
  var trigger = el('div', { className: 'lang-toggle' }, [
    makeFlag(currentLang, 16),
    document.createTextNode(langLabels[currentLang]),
    svg('<path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>', 10, 10, 2.5, 'currentColor'),
  ]);
  wrap.appendChild(trigger);

  // Dropdown menu
  var menu = el('div', { className: 'lang-menu' });
  langOrder.forEach(function(code) {
    var opt = el('div', { className: 'lang-option' + (currentLang === code ? ' active' : ''), onClick: function(e) {
      e.stopPropagation();
      menu.classList.remove('open');
      setLang(code);
    } }, [
      makeFlag(code, 18),
      document.createTextNode(langNames[code]),
    ]);
    menu.appendChild(opt);
  });
  wrap.appendChild(menu);

  // Toggle on click
  trigger.addEventListener('click', function(e) {
    e.stopPropagation();
    // Close any other open menus
    document.querySelectorAll('.lang-menu.open').forEach(function(m) { if (m !== menu) m.classList.remove('open'); });
    menu.classList.toggle('open');
  });

  return wrap;
}

// Close dropdown when clicking elsewhere
document.addEventListener('click', function() {
  document.querySelectorAll('.lang-menu.open').forEach(function(m) { m.classList.remove('open'); });
});

var toastTimer;
function showToast(msg) {
  var tt = document.getElementById('toast');

  tt.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { tt.classList.remove('show'); }, 2500);
}

    while (tbody.firstChild) tbody.removeChild(tbody.firstChild);
    var s = (search || '').toLowerCase();
    vehicles.filter(function(v) { return !s || (v.make+' '+v.model+' '+v.owner).toLowerCase().includes(s); }).forEach(function(v) {
      var sc = statusColors[v.status] || statusColors.stored;
      tbody.appendChild(el('tr', { onClick: function() { showToast(v.make + ' ' + v.model); } }, [
        el('td', { style: { fontWeight:'400', color:'rgba(250,249,247,0.9)' } }, v.make + ' ' + v.model),
        el('td', null, v.owner),
        el('td', null, [el('span', { style: { fontSize:'10px', fontWeight:'500', letterSpacing:'0.06em', textTransform:'uppercase', padding:'4px 10px', borderRadius:'9999px', background:sc[0], color:sc[1] } }, v.status)]),
        el('td', null, v.bay || '\u2014'),
        el('td', null, String(v.year)),
      ]));
    });
  }
  searchInput.addEventListener('input', function() { renderRows(searchInput.value); });
  renderRows('');
  table.appendChild(tbody);
  tableWrap.appendChild(table);
  page.appendChild(searchInput);
  page.appendChild(tableWrap);
}

function renderAdminBays() {
  var page = clear('apage-bays');
  page.style.cssText = 'display:flex;flex-direction:column;gap:24px;';

  var occupiedC = baysData.filter(function(b) { return b.status==='occupied'; }).length;
  var availableC = baysData.filter(function(b) { return b.status==='available'; }).length;
  var maintC = baysData.filter(function(b) { return b.status==='maintenance'; }).length;

  page.appendChild(el('div', { style: { display:'flex', alignItems:'flex-end', justifyContent:'space-between' } }, [
    el('div', null, [
      el('div', { className: 'section-tag', style: { marginBottom:'12px' } }, [el('span', null, t('facility'))]),
      el('h2', { className: 'heading', style: { fontSize:'1.75rem' } }, t('storageBays')),
    ]),
    el('button', { className: 'btn-outline', onClick: function() { showToast(t('newBay')); } }, t('newBay')),
  ]));

  var miniStats = el('div', { style: { display:'flex', gap:'16px' } });
  [{v:baysData.length,l:t('total'),c:'var(--white)'},{v:occupiedC,l:t('occupied'),c:'var(--gold)'},{v:availableC,l:t('available'),c:'#22c55e'},{v:maintC,l:t('maintenance'),c:'#f59e0b'}].forEach(function(s) {
    miniStats.appendChild(el('div', { style: { display:'flex', alignItems:'baseline', gap:'6px' } }, [
      el('span', { style: { fontSize:'1.25rem', fontWeight:'400', color:s.c, fontVariantNumeric:'tabular-nums' } }, String(s.v)),
      el('span', { style: { fontSize:'10px', letterSpacing:'0.12em', textTransform:'uppercase', color:'rgba(250,249,247,0.25)' } }, s.l),
    ]));
  });
  page.appendChild(miniStats);
  page.appendChild(el('div', { className: 'gold-sep' }));

  var grid = el('div', { style: { display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))', gap:'12px' } });
  baysData.forEach(function(b) {
    var sc = bayColors[b.status] || bayColors.available;
    var statusLabel = t(b.status === 'occupied' ? 'occupied' : b.status === 'available' ? 'available' : 'maintenance');
    grid.appendChild(el('div', { className: 'glass-card', style: { padding:'20px', cursor:'pointer', textAlign:'center' }, onClick: function() { showToast(t('bay') + ' ' + b.name); } }, [
      el('p', { style: { fontSize:'18px', fontWeight:'500', color:'rgba(184,149,90,0.7)', letterSpacing:'0.08em', marginBottom:'8px' } }, b.name),
      el('span', { style: { fontSize:'10px', fontWeight:'500', letterSpacing:'0.06em', textTransform:'uppercase', padding:'4px 10px', borderRadius:'9999px', background:sc[0], color:sc[1], display:'inline-block', marginBottom:'8px' } }, statusLabel),
      el('p', { style: { fontSize:'13px', color:'rgba(250,249,247,0.5)', fontWeight:'300' } }, b.vehicle || t('empty')),
    ]));
  });
  page.appendChild(grid);
}

function renderAdminInvite() {
  var page = clear('apage-invite');
  page.style.cssText = 'display:flex;flex-direction:column;gap:24px;';

  page.appendChild(el('div', null, [
    el('div', { className: 'section-tag', style: { marginBottom:'12px' } }, [el('span', null, t('onboarding'))]),
    el('h2', { className: 'heading', style: { fontSize:'1.75rem' } }, t('inviteUser')),
  ]));
  page.appendChild(el('div', { className: 'gold-sep' }));

  var inviteCard = el('div', { className: 'glass-card gold-top', style: { padding:'24px', display:'flex', flexDirection:'column', gap:'20px' } });
  var row1 = el('div', { style: { display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px' } });
  var tenantSelect = el('select', { className: 'input-field', style: { cursor:'pointer' } });
  tenantSelect.appendChild(el('option', { value: '' }, t('tenant') + '...'));
  tenants.forEach(function(ten) { tenantSelect.appendChild(el('option', { value: ten.id }, ten.name)); });
  row1.appendChild(el('div', null, [el('label', { className: 'label' }, t('tenant')), tenantSelect]));
  var roleSelect = el('select', { className: 'input-field', style: { cursor:'pointer' } });
  ['Admin','Operator','Technician','Viewer'].forEach(function(r) { roleSelect.appendChild(el('option', null, r)); });
  row1.appendChild(el('div', null, [el('label', { className: 'label' }, t('role')), roleSelect]));
  inviteCard.appendChild(row1);

  var row2 = el('div', { style: { display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'16px' } });
  row2.appendChild(el('div', null, [el('label', { className: 'label' }, t('firstName')), el('input', { className: 'input-field', placeholder: 'John' })]));
  row2.appendChild(el('div', null, [el('label', { className: 'label' }, t('lastName')), el('input', { className: 'input-field', placeholder: 'Doe' })]));
  row2.appendChild(el('div', null, [el('label', { className: 'label' }, t('email')), el('input', { className: 'input-field', type: 'email', placeholder: 'john@example.com' })]));
  inviteCard.appendChild(row2);

  var langSelect = el('select', { className: 'input-field', style: { cursor:'pointer', maxWidth:'200px' } });
  ['Fran\u00e7ais (fr)','English (en)','Deutsch (de)'].forEach(function(l) { langSelect.appendChild(el('option', null, l)); });
  inviteCard.appendChild(el('div', null, [el('label', { className: 'label' }, t('invitationLang')), langSelect]));
  inviteCard.appendChild(el('div', null, [el('button', { className: 'btn-gold', onClick: function() { showToast(t('sendInvitation') + '!'); } }, t('sendInvitation'))]));
  page.appendChild(inviteCard);

  // Users table
  page.appendChild(el('div', { style: { marginTop:'16px' } }, [
    el('div', { className: 'section-tag', style: { marginBottom:'12px' } }, [el('span', null, t('team'))]),
    el('h3', { className: 'heading', style: { fontSize:'1.25rem' } }, t('allUsers')),
  ]));
  page.appendChild(el('div', { className: 'gold-sep' }));

  var tableWrap = el('div', { style: { borderRadius:'16px', overflow:'hidden', border:'1px solid rgba(250,249,247,0.06)', marginTop:'16px' } });
  var table = el('table', { className: 'admin-table' });
  table.appendChild(el('thead', null, [el('tr', null, [
    el('th', null, t('name')), el('th', null, t('email')), el('th', null, t('role')), el('th', null, t('tenant')), el('th', null, t('lastActive')),
  ])]));
  var tbody = el('tbody');
  usersData.forEach(function(u) {
    var rc = roleColors[u.role] || roleColors.viewer;
    tbody.appendChild(el('tr', { onClick: function() { showToast(u.name); } }, [
      el('td', { style: { fontWeight:'400', color:'rgba(250,249,247,0.9)' } }, u.name),
      el('td', null, u.email),
      el('td', null, [el('span', { style: { fontSize:'10px', fontWeight:'500', letterSpacing:'0.06em', textTransform:'uppercase', padding:'4px 10px', borderRadius:'9999px', background:rc[0], color:rc[1] } }, u.role)]),
      el('td', null, u.tenant),
      el('td', { style: { color:'rgba(250,249,247,0.3)' } }, u.last),
    ]));
  });
  table.appendChild(tbody);
  tableWrap.appendChild(table);
  page.appendChild(tableWrap);
}

// ═══ INIT ═══
renderAll();
</script>
